<nb-card>
  <nb-card-header>
    <div class="row align-items-center">
      <div class="col">
        <h5 class="mb-0" style="color: #8b8b89;">
          <nb-icon icon="file-text-outline" style="margin-right: 8px;"></nb-icon>
          {{ isEditMode ? 'Modifier le Contrat' : 'Nouveau Contrat' }}
        </h5>
      </div>
    </div>
  </nb-card-header>

  <nb-card-body>
    <nb-alert *ngIf="message" [outline]="messageType" closable (close)="message = ''">{{ message }}</nb-alert>

    <form (ngSubmit)="save()">
      <div class="row">
        <div class="col-md-6">
          <div class="form-group mb-3">
            <label class="label">Boutique *</label>
            <nb-select fullWidth [(ngModel)]="contrat.idBoutique" name="idBoutique" placeholder="Choisir une boutique" required [disabled]="isEditMode">
              <nb-option *ngFor="let b of boutiques" [value]="b._id">{{ b.nom }}</nb-option>
            </nb-select>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group mb-3">
            <label class="label">Montant Mensuel (Ar) *</label>
            <input nbInput fullWidth [(ngModel)]="contrat.montantMensuel" name="montantMensuel" type="number" placeholder="Ex: 500000" required>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group mb-3">
            <label class="label">Date Début *</label>
            <input nbInput fullWidth [(ngModel)]="contrat.dateDebut" name="dateDebut" type="date" required [disabled]="isEditMode">
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group mb-3">
            <label class="label">Date Fin *</label>
            <input nbInput fullWidth [(ngModel)]="contrat.dateFin" name="dateFin" type="date" required>
          </div>
        </div>
      </div>

      <div class="d-flex" style="gap: 8px; margin-top: 16px;">
        <button nbButton status="primary" type="submit" [disabled]="loading">
          <nb-icon icon="save-outline"></nb-icon>
          {{ isEditMode ? 'Modifier' : 'Créer et Générer les Loyers' }}
        </button>
        <button nbButton status="basic" type="button" (click)="annuler()">Annuler</button>
      </div>
    </form>
  </nb-card-body>
</nb-card>
