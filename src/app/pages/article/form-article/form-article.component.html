<nb-card>
  <nb-card-header>
    <h5 class="mb-0" style="color:#8b8b89;"><nb-icon icon="archive-outline" style="margin-right:8px;"></nb-icon>{{ isEditMode ? 'Modifier Article' : 'Ajouter un Article' }}</h5>
  </nb-card-header>
  <nb-card-body>
    <nb-alert *ngIf="message" [outline]="messageType" closable (close)="message=''">{{ message }}</nb-alert>
    <form (ngSubmit)="save()">
      <div class="row">
        <div class="col-md-6">
          <div class="form-group mb-3">
            <label class="label">Nom *</label>
            <input nbInput fullWidth [(ngModel)]="article.nom" name="nom" placeholder="Nom de l'article" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group mb-3">
            <label class="label">Boutique *</label>
            <nb-select fullWidth [(ngModel)]="article.idBoutique" name="idBoutique" placeholder="Choisir" required [disabled]="isEditMode">
              <nb-option *ngFor="let b of boutiques" [value]="b._id">{{ b.nom }}</nb-option>
            </nb-select>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4">
          <div class="form-group mb-3">
            <label class="label">Prix (Ar) *</label>
            <input nbInput fullWidth [(ngModel)]="article.prix" name="prix" type="number" placeholder="Ex: 15000" required>
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group mb-3">
            <label class="label">Quantité *</label>
            <input nbInput fullWidth [(ngModel)]="article.quantite" name="quantite" type="number" placeholder="Ex: 50" required [disabled]="isEditMode">
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group mb-3">
            <label class="label">Seuil Alerte *</label>
            <input nbInput fullWidth [(ngModel)]="article.seuilAlerte" name="seuilAlerte" type="number" placeholder="Ex: 5" required>
          </div>
        </div>
      </div>
      <div class="form-group mb-3">
        <label class="label">Description</label>
        <textarea nbInput fullWidth [(ngModel)]="article.description" name="description" placeholder="Description" rows="3"></textarea>
      </div>
      <div class="form-group mb-3">
        <label class="label">Image URL</label>
        <input nbInput fullWidth [(ngModel)]="article.image" name="image" placeholder="https://...">
      </div>
      <div class="d-flex" style="gap:8px;margin-top:16px;">
        <button nbButton status="primary" type="submit" [disabled]="loading"><nb-icon icon="save-outline"></nb-icon> {{ isEditMode ? 'Modifier' : 'Enregistrer' }}</button>
        <button nbButton status="basic" type="button" (click)="annuler()">Annuler</button>
      </div>
    </form>
  </nb-card-body>
</nb-card>
